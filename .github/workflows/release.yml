name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64   go build -ldflags="-s -w" -o sambly-linux-amd64   ./cmd/server
          GOOS=linux GOARCH=arm64   go build -ldflags="-s -w" -o sambly-linux-arm64   ./cmd/server

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sambly ${{ github.ref_name }}"
          body: |
            ## Sambly ${{ github.ref_name }}

            Samba Management, Simplified!

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/buadamlaz/Sambly/main/scripts/install.sh | sudo bash
            ```

            ### Manual download

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `sambly-linux-amd64` |
            | Linux ARM64  | `sambly-linux-arm64` |

            See [README](https://github.com/buadamlaz/Sambly#readme) for full installation instructions.
          files: |
            sambly-linux-amd64
            sambly-linux-arm64
          draft: false
          prerelease: false
